<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Helper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #080c12;
      color: #dcddde;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 120, 255, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(0, 80, 200, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* AUTH */
    #auth-screen {
      position: fixed;
      inset: 0;
      background: #080c12;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #auth-screen::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 30%, rgba(0, 120, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-box {
      background: #080e18;
      border: 1px solid #0e1a2a;
      border-radius: 16px;
      padding: 36px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
    }

    .auth-logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #0078ff, #0050c8);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(0, 120, 255, 0.3);
    }

    .auth-logo-text {
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: #060a10;
      padding: 4px;
      border-radius: 10px;
    }

      padding: 8px;
