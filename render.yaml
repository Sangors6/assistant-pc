# Déploiement Render (hébergeur lié à GitHub, redéploiement auto sur push main).
# Les secrets ne sont PAS dans ce fichier : Render les demandera dans le
# dashboard (sync: false) pour ne jamais les exposer dans le dépôt.
services:
  - type: web
    name: assistant-pc
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      # --- Optionnels : fonctionnalités inertes tant que non renseignés ---
      # Reset mot de passe par email.
      # Recommandé en prod : API HTTP Brevo (port 443) — Render BLOQUE le SMTP
      # sortant. Si BREVO_API_KEY est définie, elle est utilisée en priorité ;
      # les EMAIL_* SMTP ci-dessous servent de repli (utile en local).
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Paiement Stripe (clés TEST pour valider, PROD après validation) :
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      # URL publique (redirections Stripe + lien email). Ex : https://assistant-pc.onrender.com
      - key: APP_URL
        sync: false
