<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="panel.css">
  <title>PC Helper</title>
</head>
<body>
  <div id="app">
    <div id="grab" title="Glisser pour déplacer"><span class="bar"></span></div>

    <div id="hdr">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <rect x="3" y="4" width="18" height="13" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <path d="M9 21h6M12 17v4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="titles">
        <div class="t1">PC Helper</div>
        <div class="t2" id="hdr-sub">Expert support système</div>
      </div>
      <div class="hdr-actions">
        <button id="btn-new" class="ghost gh-accent" title="Nouvelle conversation" aria-label="Nouvelle conversation" style="display:none">
          <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true">
            <path d="M20 11.5a7.5 7.5 0 0 1-10.6 6.8L4 19.5l1.3-5A7.5 7.5 0 1 1 20 11.5Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
            <path d="M12 8.5v6M9 11.5h6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="btn-hist" class="ghost" title="Historique des conversations" aria-label="Historique" style="display:none">
          <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true">
            <path d="M3.5 12a8.5 8.5 0 1 1 2.6 6.1" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            <path d="M3.2 18.6 6 18l-.6-2.8" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 7.5V12l3 2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="btn-set" class="ghost" title="Réglages" aria-label="Réglages">
          <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true">
            <path d="M5 7h14M5 12h14M5 17h14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            <circle cx="9" cy="7" r="2.4" fill="#0a0f1c" stroke="currentColor" stroke-width="1.7"/>
            <circle cx="15" cy="12" r="2.4" fill="#0a0f1c" stroke="currentColor" stroke-width="1.7"/>
            <circle cx="8" cy="17" r="2.4" fill="#0a0f1c" stroke="currentColor" stroke-width="1.7"/>
          </svg>
        </button>
        <button id="btn-logout" class="ghost gh-danger" title="Déconnexion" aria-label="Déconnexion" style="display:none">
          <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true">
            <path d="M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            <path d="M10 8 6 12l4 4M6 12h10" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="hdr-sep" aria-hidden="true"></span>
        <button id="btn-close" class="ghost gh-close" title="Fermer" aria-label="Fermer">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Réglages -->
    <div id="settings" class="sheet">
      <div class="set-block">
        <div class="set-label">Taille du panneau</div>
        <div class="seg" id="seg-size">
          <button data-size="compact">Compact</button>
          <button data-size="standard" class="on">Standard</button>
          <button data-size="large">Large</button>
        </div>
      </div>
      <div class="set-block">
        <div class="set-label">Position</div>
        <button id="reset-pos" class="pill">Réinitialiser la position</button>
      </div>
      <div class="set-hint">Astuce : glisse la barre du haut pour déplacer le panneau.</div>
    </div>

    <!-- Historique -->
    <div id="history" class="sheet">
      <div class="set-label">Conversations récentes</div>
      <div id="hist-list"><div class="hist-empty">Chargement…</div></div>
    </div>

    <!-- Connexion -->
    <form id="login">
      <h2>Connexion</h2>
      <p>Connecte-toi avec ton compte PC Helper.</p>
      <input id="email" type="email" placeholder="Email" autocomplete="username" required>
      <input id="mdp" type="password" placeholder="Mot de passe" autocomplete="current-password" required>
      <div class="msg-err" id="login-err"></div>
      <button id="login-btn" type="submit">Se connecter</button>
    </form>

    <!-- Chat -->
    <div id="chat">
      <div id="hw"></div>
      <div id="msgs">
        <div id="welcome">
          <div class="orb">🖥️</div>
          <h3>Salut ! 👋</h3>
          <p>Décris ton problème, ou choisis une piste :</p>
          <div id="suggestions">
            <button class="sug" data-q="Mon PC rame, comment l'accélérer ?">⚡ PC lent</button>
            <button class="sug" data-q="Mon Wi-Fi est instable, que faire ?">📶 Wi-Fi instable</button>
            <button class="sug" data-q="J'ai un écran bleu Windows, aide-moi.">💙 Écran bleu</button>
            <button class="sug" data-q="Mes FPS sont trop bas en jeu.">🎮 FPS bas</button>
          </div>
          <button id="btn-analyse" class="analyse">🔍 Analyser mon matériel</button>
        </div>
      </div>
      <div id="bar">
        <textarea id="input" rows="1" placeholder="Décris ton problème..."></textarea>
        <button id="send" title="Envoyer">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M4 12l15-7-6 7 6 7-15-7z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
