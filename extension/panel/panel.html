<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="panel.css">
  <title>PC Helper</title>
</head>
<body>
  <div id="app">
    <div id="grab" title="Glisser pour déplacer"><span class="bar"></span></div>

    <div id="hdr">
      <div class="logo">🖥️</div>
      <div class="titles">
        <div class="t1">PC Helper</div>
        <div class="t2" id="hdr-sub">Expert support système</div>
      </div>
      <button id="btn-new"    class="ghost" title="Nouvelle conversation" style="display:none">＋</button>
      <button id="btn-hist"   class="ghost" title="Historique" style="display:none">🗂</button>
      <button id="btn-set"    class="ghost" title="Réglages">⚙</button>
      <button id="btn-logout" class="ghost" title="Déconnexion" style="display:none">⏏</button>
      <button id="btn-close"  class="ghost" title="Fermer">✕</button>
    </div>

    <!-- Réglages -->
    <div id="settings" class="sheet">
      <div class="set-block">
        <div class="set-label">Taille du panneau</div>
        <div class="seg" id="seg-size">
          <button data-size="compact">Compact</button>
          <button data-size="standard" class="on">Standard</button>
          <button data-size="large">Large</button>
        </div>
      </div>
      <div class="set-block">
        <div class="set-label">Position</div>
        <button id="reset-pos" class="pill">Réinitialiser la position</button>
      </div>
      <div class="set-hint">Astuce : glisse la barre du haut pour déplacer le panneau.</div>
    </div>

    <!-- Historique -->
    <div id="history" class="sheet">
      <div class="set-label">Conversations récentes</div>
      <div id="hist-list"><div class="hist-empty">Chargement…</div></div>
    </div>

    <!-- Connexion -->
    <form id="login">
      <h2>Connexion</h2>
      <p>Connecte-toi avec ton compte PC Helper.</p>
      <input id="email" type="email" placeholder="Email" autocomplete="username" required>
      <input id="mdp" type="password" placeholder="Mot de passe" autocomplete="current-password" required>
      <div class="msg-err" id="login-err"></div>
      <button id="login-btn" type="submit">Se connecter</button>
    </form>

    <!-- Chat -->
    <div id="chat">
      <div id="hw"></div>
      <div id="msgs">
        <div id="welcome">
          <div class="orb">🖥️</div>
          <h3>Salut ! 👋</h3>
          <p>Décris ton problème, ou choisis une piste :</p>
          <div id="suggestions">
            <button class="sug" data-q="Mon PC rame, comment l'accélérer ?">⚡ PC lent</button>
            <button class="sug" data-q="Mon Wi-Fi est instable, que faire ?">📶 Wi-Fi instable</button>
            <button class="sug" data-q="J'ai un écran bleu Windows, aide-moi.">💙 Écran bleu</button>
            <button class="sug" data-q="Mes FPS sont trop bas en jeu.">🎮 FPS bas</button>
          </div>
          <button id="btn-analyse" class="analyse">🔍 Analyser mon matériel</button>
        </div>
      </div>
      <div id="bar">
        <textarea id="input" rows="1" placeholder="Décris ton problème..."></textarea>
        <button id="send" title="Envoyer">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M4 12l15-7-6 7 6 7-15-7z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
