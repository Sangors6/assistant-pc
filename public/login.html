<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Helper</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { background: #03070d; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: radial-gradient(circle at 70% 38%, #071a32 0%, #03070d 50%, #02050a 100%);
      color: #f5f8ff;
    }

    /* Fondu d'entrée (transition douce depuis l'accueil) */
    body { animation: loginIn .6s ease both; }
    @keyframes loginIn { from { opacity: 0; } to { opacity: 1; } }
    body.leaving, body.home-out { animation: none; }

    /* Décor de fond (cohérent avec l'accueil / le chargement) */
    .bg-grid, .bg-noise, .bg-glow, .bg-orb {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-grid {
      opacity: .14;
      background:
        linear-gradient(rgba(64, 128, 255, .12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(64, 128, 255, .12) 1px, transparent 1px);
      background-size: 70px 70px;
      transform: perspective(760px) rotateX(70deg) translateY(34vh) scale(1.5);
      transform-origin: bottom;
    }

    .bg-noise {
      opacity: .10;
      background-image: radial-gradient(rgba(255,255,255,.18) 1px, transparent 1px);
      background-size: 3px 3px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 16%, black 86%, transparent 100%);
    }

    .bg-orb {
      background:
        radial-gradient(circle at 78% 42%, rgba(39, 127, 255, .20), transparent 24%),
        radial-gradient(circle at 12% 60%, rgba(21, 90, 198, .14), transparent 26%);
    }

    .bg-glow {
      background: radial-gradient(ellipse 70% 55% at 50% -16%, rgba(45, 130, 255, .14) 0%, transparent 70%);
      animation: glowBreathe 5s ease-in-out infinite;
    }
    @keyframes glowBreathe { 0%,100% { opacity: .7; } 50% { opacity: 1; } }

    /* Bouton retour accueil */
    .home-btn {
      position: fixed;
      top: 26px;
      left: 28px;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 16px;
      border-radius: 11px;
      border: 1px solid rgba(98, 166, 255, .22);
      background: rgba(8, 18, 35, .55);
      backdrop-filter: blur(10px);
      color: #b9c6de;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: .22s ease;
    }
    .home-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(111, 178, 255, .45);
      color: #fff;
      background: rgba(13, 30, 55, .7);
    }
    .home-btn svg { width: 15px; height: 15px; fill: currentColor; }

    /* Transition de sortie calée sur la durée du swoosh (~1.15 s) */
    #card { transition: opacity 1.05s cubic-bezier(.7,0,.84,0), transform 1.05s cubic-bezier(.7,0,.84,0), filter 1.05s ease; }

    body.leaving { background: #02040a; }
    body.leaving .bg-glow,
    body.leaving .home-btn { opacity: 0; transition: opacity .6s ease; }
    body.leaving #card {
      opacity: 0;
      transform: translateY(-14px) scale(.955);
      filter: blur(3px);
      pointer-events: none;
    }

    /* Retour accueil : fondu rapide sans son */
    body.home-out #card { transition: opacity .46s cubic-bezier(.7,0,.84,0), transform .46s cubic-bezier(.7,0,.84,0), filter .46s ease; }
    body.home-out { background: #02040a; }
    body.home-out .bg-glow,
    body.home-out .home-btn { opacity: 0; transition: opacity .42s ease; }
    body.home-out #card {
      opacity: 0;
      transform: translateY(10px) scale(.97);
      filter: blur(3px);
      pointer-events: none;
    }

    #card {
      position: relative;
      z-index: 10;
      width: 420px;
      background: rgba(8, 14, 28, 0.97);
      border: 1px solid rgba(0, 80, 200, 0.2);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 100px rgba(0, 40, 160, 0.08);
    }

    #logo {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }

    #logo-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, #1a6eff, #0040cc);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(26, 110, 255, 0.4);
    }

    #logo-name { font-size: 22px; font-weight: 700; color: #ffffff; }
    #logo-sub { font-size: 11px; color: #3a5a8a; font-weight: 400; }

    #tabs {
      display: flex;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 80, 200, 0.15);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      color: #3a5a8a;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: linear-gradient(135deg, #1a6eff, #0040cc);
      color: #ffffff;
      box-shadow: 0 2px 12px rgba(26, 110, 255, 0.35);
    }

    .field { margin-bottom: 18px; }

    .field-label {
      font-size: 10px;
      font-weight: 700;
      color: #1a6eff;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .field-input {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 80, 200, 0.18);
      border-radius: 10px;
      padding: 12px 14px;
      transition: all 0.2s;
    }

    .field-input:focus-within {
      border-color: #1a6eff;
      box-shadow: 0 0 0 3px rgba(26, 110, 255, 0.1);
    }

    .field-icon { font-size: 15px; flex-shrink: 0; opacity: 0.4; }

    .field-input input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #c8d8e8;
      font-size: 14px;
      font-family: inherit;
    }

    .field-input input::placeholder { color: #1e3050; }

    .eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      opacity: 0.35;
      transition: opacity 0.15s;
      padding: 0;
    }
    .eye-btn:hover { opacity: 0.7; }

    #options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #3a5a8a;
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #1a6eff;
      cursor: pointer;
    }

    #forgot { color: #1a6eff; font-size: 13px; cursor: pointer; text-decoration: none; }
    #forgot:hover { text-decoration: underline; }

    #message {
      text-align: center;
      font-size: 13px;
      min-height: 18px;
      margin-bottom: 14px;
      color: #ff4444;
    }
    #message.succes { color: #00c853; }

    #bouton {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a6eff, #0040cc);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(26, 110, 255, 0.35);
      margin-bottom: 24px;
    }

    #bouton:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(26, 110, 255, 0.5);
    }

    #footer-info {
      display: flex;
      align-items: center;
      border: 1px solid rgba(0, 80, 200, 0.15);
      border-radius: 10px;
      overflow: hidden;
    }

    .footer-item {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      font-size: 12px;
      color: #3a5a8a;
    }

    .footer-item + .footer-item { border-left: 1px solid rgba(0, 80, 200, 0.15); }
    .footer-item span { color: #1a6eff; font-weight: 600; }
  </style>
</head>
<body>

  <audio id="snd-swoosh" src="/swoosh.mp3" preload="auto"></audio>

  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
  <div class="bg-orb"></div>
  <div class="bg-glow"></div>

  <a class="home-btn" href="/" aria-label="Retour à l'accueil">
    <svg viewBox="0 0 24 24"><path d="M12 3.2 2.5 11h2.3v9h5v-6h4.4v6h5v-9h2.3L12 3.2Z"/></svg>
    Accueil
  </a>

  <div id="card">
    <div id="logo">
      <div id="logo-icon">🖥️</div>
      <div>
        <div id="logo-name">PC Helper</div>
        <div id="logo-sub">Votre assistant tech personnel</div>
      </div>
    </div>

    <div id="tabs">
      <div class="tab active" onclick="changerTab('connexion')">Connexion</div>
      <div class="tab" onclick="changerTab('inscription')">Inscription</div>
    </div>

    <div class="field">
      <label class="field-label">Email</label>
      <div class="field-input">
        <span class="field-icon">✉️</span>
        <input type="email" id="email" placeholder="ton@email.com">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Mot de passe</label>
      <div class="field-input">
        <span class="field-icon">🔒</span>
        <input type="password" id="mdp" placeholder="••••••••">
        <button class="eye-btn" onclick="toggleMdp()">👁️</button>
      </div>
    </div>

    <div id="options">
      <label class="remember">
        <input type="checkbox" id="remember" checked>
        Se souvenir de moi
      </label>
      <a id="forgot" href="#">Mot de passe oublié ?</a>
    </div>

    <div id="message"></div>

    <button id="bouton" onclick="soumettre()">
      <span id="bouton-texte">→ Se connecter</span>
    </button>

    <div id="footer-info">
      <div class="footer-item">Gratuit : <span>10 messages</span></div>
      <div class="footer-item">Pro : <span>illimité</span></div>
    </div>
  </div>

  <script>
    let modeActuel = 'connexion'

    function changerTab(mode) {
      modeActuel = mode
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (mode === 'connexion' && i === 0) || (mode === 'inscription' && i === 1))
      })
      document.getElementById('bouton-texte').textContent = mode === 'connexion' ? '→ Se connecter' : '→ Créer mon compte'
      document.getElementById('message').textContent = ''
      document.getElementById('options').style.display = mode === 'connexion' ? 'flex' : 'none'
    }

    function toggleMdp() {
      const input = document.getElementById('mdp')
      input.type = input.type === 'password' ? 'text' : 'password'
    }

    async function soumettre() {
      const email = document.getElementById('email').value.trim()
      const mdp = document.getElementById('mdp').value
      const msg = document.getElementById('message')

      if (!email || !mdp) {
        msg.textContent = 'Remplis tous les champs'
        msg.className = ''
        return
      }

      const url = modeActuel === 'connexion' ? '/auth/connexion' : '/auth/inscription'

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, motDePasse: mdp })
        })

        const data = await res.json()

        if (!res.ok) {
          msg.textContent = data.erreur
          msg.className = ''
          return
        }

        if (modeActuel === 'inscription') {
          msg.textContent = 'Compte créé ! Connecte-toi maintenant.'
          msg.className = 'succes'
          changerTab('connexion')
        } else {
          localStorage.setItem('token', data.token)
          localStorage.setItem('email', data.email)
          document.body.classList.add('leaving')

          var partiVers = false
          function versChargement() {
            if (partiVers) return
            partiVers = true
            window.location.href = '/chargement.html'
          }

          try {
            var sw = document.getElementById('snd-swoosh')
            sw.volume = 0.35
            sw.currentTime = 0
            // On ne quitte la page qu'à la fin réelle du son -> pas de coupure.
            sw.addEventListener('ended', versChargement)
            var p = sw.play()
            if (p && p.catch) p.catch(function () { setTimeout(versChargement, 460) })
            // Sécurité si l'événement 'ended' ne se déclenche pas.
            setTimeout(versChargement, 5000)
          } catch (e) {
            setTimeout(versChargement, 460)
          }
        }

      } catch {
        msg.textContent = 'Erreur de connexion au serveur'
        msg.className = ''
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') soumettre()
    })

    // Retour vers l'accueil avec transition (sans son)
    var btnAccueil = document.querySelector('.home-btn')
    if (btnAccueil) {
      btnAccueil.addEventListener('click', function (e) {
        e.preventDefault()
        if (document.body.classList.contains('home-out') || document.body.classList.contains('leaving')) return
        document.body.classList.add('home-out')
        setTimeout(function () { window.location.href = '/' }, 480)
      })
    }

    if (localStorage.getItem('token')) {
      window.location.href = '/app.html'
    }
  </script>
</body>
</html>
