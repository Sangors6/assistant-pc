<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <!-- X-Frame-Options / X-Content-Type-Options : envoyés en VRAIS en-têtes
       HTTP par le serveur (server.js) — invalides en <meta>, retirés ici. -->
  <meta name="theme-color" content="#03070d" />
  <title>PC Helper - Chargement</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { background: #03070d; }

    :root {
      --bg: #03070d;
      --blue: #2d82ff;
      --blue-soft: #68a9ff;
      --cyan: #4ee7ff;
      --text: #f5f8ff;
      --muted: #8b96ad;
    }

    body {
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at 70% 38%, #071a32 0%, #03070d 50%, #02050a 100%);
      color: var(--text);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-grid, .bg-noise, .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-grid {
      opacity: .14;
      background:
        linear-gradient(rgba(64, 128, 255, .12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(64, 128, 255, .12) 1px, transparent 1px);
      background-size: 70px 70px;
      transform: perspective(760px) rotateX(70deg) translateY(36vh) scale(1.5);
      transform-origin: bottom;
    }

    .bg-noise {
      opacity: .10;
      background-image: radial-gradient(rgba(255,255,255,.18) 1px, transparent 1px);
      background-size: 3px 3px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 84%, transparent 100%);
    }

    .bg-glow {
      background: radial-gradient(ellipse 70% 55% at 50% -16%, rgba(45, 130, 255, .14) 0%, transparent 70%);
      animation: breathe 5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: .7; }
      50% { opacity: 1; }
    }

    /* Entrée de page */
    .stage {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      padding: 0 24px;
      text-align: center;
      opacity: 0;
      transform: translateY(18px) scale(.965);
      animation: enter 1s cubic-bezier(.16,1,.3,1) .05s forwards;
      will-change: opacity, transform;
    }

    @keyframes enter {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ===== Loader façon Discord (points rebondissants) ===== */
    .loader {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 15px;
      height: 64px;
    }
    .loader::before {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(45,130,255,.18), transparent 64%);
      filter: blur(20px);
      z-index: -1;
      animation: loaderHalo 2.4s ease-in-out infinite;
    }
    @keyframes loaderHalo {
      0%, 100% { opacity: .45; transform: translate(-50%,-50%) scale(.88); }
      50%      { opacity: .9;  transform: translate(-50%,-50%) scale(1.06); }
    }
    .loader .dot {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: linear-gradient(180deg, #7db9ff, #1a6eff);
      box-shadow: 0 0 16px rgba(45,130,255,.75), inset 0 1px 1px rgba(255,255,255,.4);
      animation: lbounce 1.05s ease-in-out infinite;
    }
    .loader .dot:nth-child(2) { animation-delay: .14s; }
    .loader .dot:nth-child(3) { animation-delay: .28s; }
    @keyframes lbounce {
      0%, 100% { transform: translateY(6px) scale(.85); opacity: .55; }
      45%      { transform: translateY(-16px) scale(1.06); opacity: 1; }
    }

    /* ===== Carte « Le saviez-vous ? » façon Discord ===== */
    .tip-card {
      width: 460px;
      max-width: 86vw;
      background: rgba(10, 22, 43, .55);
      border: 1px solid rgba(98, 166, 255, .18);
      border-radius: 14px;
      padding: 16px 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.04);
      text-align: left;
    }
    .tip-head {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .18em;
      color: var(--blue-soft);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .tip-head .spark {
      width: 16px; height: 16px; border-radius: 5px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #3389ff, #0c4bce);
      font-size: 9px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-weight: 900;
      font-size: 21px;
      letter-spacing: -.02em;
    }

    .brand .logo {
      width: 30px; height: 30px; border-radius: 9px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #3389ff, #0c4bce);
      box-shadow: 0 0 24px rgba(45,130,255,.55);
    }
    .brand .logo svg { width: 17px; height: 17px; fill: white; }

    .phrase {
      min-height: 40px;
      font-size: 14px;
      line-height: 1.5;
      color: #c6d4ec;
      font-weight: 500;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity .4s ease, transform .4s ease;
    }
    .phrase.show { opacity: 1; transform: translateY(0); }

    /* ===== Barre de chargement améliorée (façon Discord) ===== */
    .bar-wrap {
      width: 460px;
      max-width: 86vw;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .bar-shell {
      position: relative;
      flex: 1;
      height: 10px;
      border-radius: 999px;
      background: rgba(98, 166, 255, .10);
      border: 1px solid rgba(98, 166, 255, .14);
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.4), inset 0 0 10px rgba(45,130,255,.08);
    }

    .bar-fill {
      position: relative;
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #1a6eff 0%, #3d8bff 45%, #4ee7ff 100%);
      box-shadow: 0 0 14px rgba(78, 231, 255, .6), 0 0 4px rgba(120,200,255,.8);
      will-change: width;
      transition: box-shadow .3s ease;
    }
    /* Pastille lumineuse en tête de barre */
    .bar-fill::before {
      content: "";
      position: absolute;
      right: -1px;
      top: 50%;
      width: 14px;
      height: 14px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: #eaf6ff;
      box-shadow: 0 0 12px 2px rgba(120,225,255,.9);
    }
    /* Reflet qui balaie */
    .bar-fill::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 70px;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent);
      animation: sweep 1.15s linear infinite;
    }

    @keyframes sweep {
      from { transform: translateX(-70px); }
      to { transform: translateX(460px); }
    }

    .pct {
      font-size: 13px;
      font-weight: 700;
      color: #c6d4ec;
      font-variant-numeric: tabular-nums;
      letter-spacing: .04em;
      min-width: 42px;
      text-align: right;
    }

    /* Pied de page */
    .foot {
      position: fixed;
      bottom: 22px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(139,150,173,.45);
      letter-spacing: .04em;
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }
    .foot span { display: inline-flex; align-items: center; gap: 6px; }
    .foot .sep { width: 4px; height: 4px; border-radius: 50%; background: rgba(98,166,255,.35); }

    /* Sortie de page (avant redirection) */
    body.leaving .stage,
    body.leaving .foot { animation: leave .55s cubic-bezier(.7,0,.84,0) forwards; }
    body.leaving .bg-glow { opacity: 0; transition: opacity .55s ease; }
    @keyframes leave {
      to { opacity: 0; transform: translateY(-16px) scale(.955); filter: blur(3px); }
    }

    @media (max-width: 640px) {
      .loader .dot { width: 14px; height: 14px; }
      .tip-card { padding: 14px 16px; }
      .phrase { font-size: 13px; }
    }
  </style>
</head>
<body>
  <audio id="snd-ring" src="/ring.mp3" preload="auto"></audio>

  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
  <div class="bg-glow"></div>

  <div class="stage">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5v8A2.5 2.5 0 0 1 17.5 16H13v2h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-2H6.5A2.5 2.5 0 0 1 4 13.5v-8Z"/></svg>
      </div>
      <span>PC Helper</span>
    </div>

    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="tip-card">
      <div class="tip-head"><span class="spark">⚡</span> Le saviez-vous ?</div>
      <div class="phrase" id="phrase"></div>
    </div>

    <div class="bar-wrap">
      <div class="bar-shell">
        <div class="bar-fill" id="bar"></div>
      </div>
      <div class="pct" id="pct">0&nbsp;%</div>
    </div>
  </div>

  <div class="foot">
    <span>🔒 Connexion chiffrée</span>
    <span class="sep"></span>
    <span>PC Helper</span>
    <span class="sep"></span>
    <span>v1.0</span>
  </div>

  <script>
    if (!localStorage.getItem('token')) {
      window.location.replace('/login.html')
    }

    // Déblocage audio : on lance le son en muet au chargement (l'autoplay
    // muet est toujours autorisé), ce qui "active" l'élément pour pouvoir
    // le rejouer avec le son plus tard sans clic utilisateur.
    var ring = document.getElementById('snd-ring')
    ring.volume = 0.35
    var ringMs = 0
    function noterDuree() {
      if (isFinite(ring.duration) && ring.duration > 0) ringMs = ring.duration * 1000
    }
    ring.addEventListener('loadedmetadata', noterDuree)
    try {
      ring.muted = true
      var unlock = ring.play()
      if (unlock && unlock.then) {
        unlock.then(function () {
          // Ne pas perturber la lecture réelle si elle a déjà commencé.
          if (!ringLance) {
            ring.pause()
            ring.currentTime = 0
            ring.muted = false
          }
          noterDuree()
        }).catch(function () { ring.muted = false })
      }
    } catch (e) {}

    var phrases = [
      "Tu peux envoyer une capture d'écran à PC Helper : il analyse l'image et identifie le problème visible.",
      "Décris ton souci avec un maximum de détails (modèle, message d'erreur exact) pour une réponse plus précise.",
      "PC Helper affiche en direct la charge CPU, la RAM, le GPU, le ping et la température de ta machine.",
      "Chaque conversation est sauvegardée et isolée par compte : tu retrouves ton historique à tout moment.",
      "Ta connexion est chiffrée et tes mots de passe ne sont jamais stockés en clair.",
      "Astuce : pose une question précise à la fois — PC Helper va droit au but, sans remplissage.",
      "Tu peux faire analyser tes périphériques (souris, clavier, casque) depuis la barre latérale.",
      "Un diagnostic clair commence par les bons symptômes : quand, comment, depuis quand ?",
      "PC Helper te corrige si ta piste est mauvaise — il ne valide pas une erreur pour te faire plaisir.",
      "Ctrl+K ouvre un nouveau chat, Ctrl+/ place le curseur dans la saisie."
    ]

    function melanger(a) {
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1))
        var t = a[i]; a[i] = a[j]; a[j] = t
      }
      return a
    }

    var pool = melanger(phrases.slice())
    var phraseEl = document.getElementById('phrase')
    var barEl = document.getElementById('bar')
    var pctEl = document.getElementById('pct')

    var idx = 0
    function afficherPhrase() {
      phraseEl.classList.remove('show')
      setTimeout(function () {
        phraseEl.textContent = pool[idx % pool.length]
        phraseEl.classList.add('show')
        idx++
      }, 220)
    }

    var DUREE = 5000
    var debut = null
    afficherPhrase()
    var rotation = setInterval(afficherPhrase, 2400)

    // Courbe douce (ease-in-out) pour une progression naturelle
    function ease(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2
    }

    var ringLance = false
    var fini = false

    // Navigation : déclenchée UNIQUEMENT quand le son est totalement terminé,
    // jamais pendant qu'il joue -> aucune coupure audible.
    function versDashboard() {
      if (fini) return
      fini = true
      clearInterval(rotation)
      document.body.classList.add('leaving')
      setTimeout(function () { window.location.replace('/app.html') }, 600)
    }

    ring.addEventListener('ended', versDashboard)

    function lancerRing() {
      if (ringLance) return
      ringLance = true
      try {
        ring.muted = false
        ring.currentTime = 0
        var pr = ring.play()
        if (pr && pr.catch) pr.catch(function () { versDashboard() })
      } catch (e) { versDashboard() }
      // Sécurité : si 'ended' ne se déclenche jamais, on part quand même
      // une fois la durée du son écoulée (+ marge).
      setTimeout(versDashboard, (ringMs || 4000) + 1200)
    }

    function frame(now) {
      if (debut === null) debut = now
      var ecoule = now - debut
      var t = Math.min(1, ecoule / DUREE)
      var p = ease(t) * 100
      barEl.style.width = p + '%'
      pctEl.innerHTML = Math.round(p) + '&nbsp;%'

      // On démarre le ring assez tôt pour qu'il SE TERMINE pile à la fin
      // du chargement (start = DUREE - durée du son).
      if (!ringLance) {
        var depart = ringMs > 0 ? Math.max(0, DUREE - ringMs) : DUREE
        if (ecoule >= depart) lancerRing()
      }

      if (t < 1 || !ringLance) requestAnimationFrame(frame)
    }

    requestAnimationFrame(frame)
  </script>
</body>
</html>
