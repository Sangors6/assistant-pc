<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Helper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #080c12;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 120, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    #card {
      position: relative;
      z-index: 10;
      width: 420px;
      background: rgba(8, 14, 28, 0.97);
      border: 1px solid rgba(0, 80, 200, 0.2);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 100px rgba(0, 40, 160, 0.08);
    }

    #logo {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }

    #logo-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, #1a6eff, #0040cc);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(26, 110, 255, 0.4);
    }

    #logo-name { font-size: 22px; font-weight: 700; color: #ffffff; }
    #logo-sub { font-size: 11px; color: #3a5a8a; font-weight: 400; }

    #tabs {
      display: flex;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 80, 200, 0.15);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      color: #3a5a8a;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: linear-gradient(135deg, #1a6eff, #0040cc);
      color: #ffffff;
      box-shadow: 0 2px 12px rgba(26, 110, 255, 0.35);
    }

    .field { margin-bottom: 18px; }

    .field-label {
      font-size: 10px;
      font-weight: 700;
      color: #1a6eff;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .field-input {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 80, 200, 0.18);
      border-radius: 10px;
      padding: 12px 14px;
      transition: all 0.2s;
    }

    .field-input:focus-within {
      border-color: #1a6eff;
      box-shadow: 0 0 0 3px rgba(26, 110, 255, 0.1);
    }

    .field-icon { font-size: 15px; flex-shrink: 0; opacity: 0.4; }

    .field-input input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #c8d8e8;
      font-size: 14px;
      font-family: inherit;
    }

    .field-input input::placeholder { color: #1e3050; }

    .eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      opacity: 0.35;
      transition: opacity 0.15s;
      padding: 0;
    }
    .eye-btn:hover { opacity: 0.7; }

    #options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #3a5a8a;
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #1a6eff;
      cursor: pointer;
    }

    #forgot { color: #1a6eff; font-size: 13px; cursor: pointer; text-decoration: none; }
    #forgot:hover { text-decoration: underline; }

    #message {
      text-align: center;
      font-size: 13px;
      min-height: 18px;
      margin-bottom: 14px;
      color: #ff4444;
    }
    #message.succes { color: #00c853; }

    #bouton {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a6eff, #0040cc);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(26, 110, 255, 0.35);
      margin-bottom: 24px;
    }

    #bouton:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(26, 110, 255, 0.5);
    }

    #footer-info {
      display: flex;
      align-items: center;
      border: 1px solid rgba(0, 80, 200, 0.15);
      border-radius: 10px;
      overflow: hidden;
    }

    .footer-item {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      font-size: 12px;
      color: #3a5a8a;
    }

    .footer-item + .footer-item { border-left: 1px solid rgba(0, 80, 200, 0.15); }
    .footer-item span { color: #1a6eff; font-weight: 600; }
  </style>
</head>
<body>

  <div id="card">
    <div id="logo">
      <div id="logo-icon">🖥️</div>
      <div>
        <div id="logo-name">PC Helper</div>
        <div id="logo-sub">Votre assistant tech personnel</div>
      </div>
    </div>

    <div id="tabs">
      <div class="tab active" onclick="changerTab('connexion')">Connexion</div>
      <div class="tab" onclick="changerTab('inscription')">Inscription</div>
    </div>

    <div class="field">
      <label class="field-label">Email</label>
      <div class="field-input">
        <span class="field-icon">✉️</span>
        <input type="email" id="email" placeholder="ton@email.com">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Mot de passe</label>
      <div class="field-input">
        <span class="field-icon">🔒</span>
        <input type="password" id="mdp" placeholder="••••••••">
        <button class="eye-btn" onclick="toggleMdp()">👁️</button>
      </div>
    </div>

    <div id="options">
      <label class="remember">
        <input type="checkbox" id="remember" checked>
        Se souvenir de moi
      </label>
      <a id="forgot" href="#">Mot de passe oublié ?</a>
    </div>

    <div id="message"></div>

    <button id="bouton" onclick="soumettre()">
      <span id="bouton-texte">→ Se connecter</span>
    </button>

    <div id="footer-info">
      <div class="footer-item">Gratuit : <span>10 messages</span></div>
      <div class="footer-item">Pro : <span>illimité</span></div>
    </div>
  </div>

  <script>
    let modeActuel = 'connexion'

    function changerTab(mode) {
      modeActuel = mode
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (mode === 'connexion' && i === 0) || (mode === 'inscription' && i === 1))
      })
      document.getElementById('bouton-texte').textContent = mode === 'connexion' ? '→ Se connecter' : '→ Créer mon compte'
      document.getElementById('message').textContent = ''
      document.getElementById('options').style.display = mode === 'connexion' ? 'flex' : 'none'
    }

    function toggleMdp() {
      const input = document.getElementById('mdp')
      input.type = input.type === 'password' ? 'text' : 'password'
    }

    async function soumettre() {
      const email = document.getElementById('email').value.trim()
      const mdp = document.getElementById('mdp').value
      const msg = document.getElementById('message')

      if (!email || !mdp) {
        msg.textContent = 'Remplis tous les champs'
        msg.className = ''
        return
      }

      const url = modeActuel === 'connexion' ? '/auth/connexion' : '/auth/inscription'

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, motDePasse: mdp })
        })

        const data = await res.json()

        if (!res.ok) {
          msg.textContent = data.erreur
          msg.className = ''
          return
        }

        if (modeActuel === 'inscription') {
          msg.textContent = 'Compte créé ! Connecte-toi maintenant.'
          msg.className = 'succes'
          changerTab('connexion')
        } else {
          localStorage.setItem('token', data.token)
          localStorage.setItem('email', data.email)
          window.location.href = '/index.html'
        }

      } catch {
        msg.textContent = 'Erreur de connexion au serveur'
        msg.className = ''
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') soumettre()
    })

    if (localStorage.getItem('token')) {
      window.location.href = '/index.html'
    }
  </script>
</body>
</html>
